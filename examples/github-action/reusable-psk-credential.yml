# Example GitHub Actions workflow: fetch credentials via reusable PSK
#
# Prerequisites:
#   1. A machine running `aac listen --reusable-psk` with Bitwarden unlocked
#   2. The PSK token stored as a GitHub Actions secret (AAC_TOKEN)
#   3. The `aac` binary available (install step below)
#
# Setup (one-time, on the listener machine):
#   $ aac listen --reusable-psk
#   REUSABLE PSK TOKEN: <129-char-token>
#   → Copy the token to GitHub → Settings → Secrets → AAC_TOKEN

name: Fetch credential via reusable PSK

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to fetch credentials for"
        required: true
        default: "registry.example.com"

jobs:
  fetch-credential:
    runs-on: ubuntu-latest
    steps:
      - name: Install aac
        run: |
          curl -fsSL "https://github.com/bitwarden/agent-access-sdk/releases/latest/download/aac-linux-x86_64" -o aac
          chmod +x aac
          sudo mv aac /usr/local/bin/

      - name: Fetch credential
        id: credential
        env:
          AAC_TOKEN: ${{ secrets.AAC_TOKEN }}
        run: |
          result=$(aac connect \
            --domain "${{ inputs.domain }}" \
            --ephemeral-connection \
            --output json)

          echo "username=$(echo "$result" | jq -r '.credential.username')" >> "$GITHUB_OUTPUT"
          echo "password=$(echo "$result" | jq -r '.credential.password')" >> "$GITHUB_OUTPUT"

      - name: Use credential (example — docker login)
        run: |
          echo "${{ steps.credential.outputs.password }}" | \
            docker login "${{ inputs.domain }}" \
              -u "${{ steps.credential.outputs.username }}" \
              --password-stdin
